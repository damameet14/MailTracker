openapi: 3.1.0
info:
  title: Inbox CRM API
  version: 0.1.0
  description: Private CRM API. Open detections are tracking-image requests, not proof of reading.
servers:
  - url: http://localhost:3000
paths:
  /api/health:
    get:
      summary: Service health
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                type: object
                required: [status, service, timestamp]
                properties:
                  status: { type: string }
                  service: { type: string }
                  timestamp: { type: string, format: date-time }
  /api/t/{token}/pixel.gif:
    get:
      summary: Public tracking image
      description: Always returns a transparent GIF without disclosing token validity.
      parameters:
        - in: path
          name: token
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Transparent GIF
          content:
            image/gif:
              schema: { type: string, contentEncoding: binary }

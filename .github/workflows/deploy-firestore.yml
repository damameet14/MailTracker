name: Deploy Firestore Configuration

on:
  push:
    branches: [main]
    paths:
      - firebase/firestore.rules
      - firebase/firestore.indexes.json
      - firebase/firebase.json
      - .github/workflows/deploy-firestore.yml

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/234444543333/locations/global/workloadIdentityPools/github/providers/mailtracker
          service_account: mailtracker-github@inbox-crm-530324.iam.gserviceaccount.com
          token_format: access_token
      - uses: pnpm/action-setup@v4
        with:
          version: 10.12.4
      - run: pnpm dlx firebase-tools deploy --only firestore:rules,firestore:indexes --project inbox-crm-530324 --config firebase/firebase.json --non-interactive --token "$FIREBASE_TOKEN"
        env:
          FIREBASE_TOKEN: ${{ steps.auth.outputs.access_token }}
